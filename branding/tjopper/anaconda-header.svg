<?xml version="1.0" encoding="UTF-8"?>
<!--
  Macrosofty Anaconda installer header — 800x88 wide banner.
  Tjopper (wave expression) on the left, "Macrosofty" wordmark on the right.
  Transparent background so it composites on whatever Anaconda's topbar uses.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="88" viewBox="0 0 800 88">
  <title>Macrosofty — Anaconda installer header</title>

  <!-- Tjopper, scaled into an 80x80 box at x=4..84 -->
  <g transform="translate(4 4) scale(0.2)">
    <!-- Arch -->
    <path d="M 90 320 V 200 A 110 110 0 0 1 310 200 V 320"
          fill="none" stroke="#E89A2B" stroke-width="70"
          stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Body + wave hand -->
    <g transform="rotate(2.5 200 320) translate(200 320) scale(1.30) translate(-200 -320)">
      <path d="M 153 320 Q 145 320 145 312 L 145 215 Q 145 155 200 155 Q 255 155 255 215 L 255 312 Q 255 320 247 320 Z"
            fill="#F4E9D5"/>
      <path d="M 250 222 Q 262 200 268 178"
            fill="none" stroke="#F4E9D5" stroke-width="20"
            stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="268" cy="178" r="14" fill="#F4E9D5"/>
      <circle cx="170" cy="244" r="10" fill="#D87767" fill-opacity="0.45"/>
      <circle cx="230" cy="244" r="10" fill="#D87767" fill-opacity="0.45"/>
      <circle cx="184" cy="216" r="11" fill="#222222"/>
      <circle cx="216" cy="216" r="11" fill="#222222"/>
      <path d="M 174 268 Q 200 292 226 268"
            fill="none" stroke="#222222" stroke-width="10.5"
            stroke-linecap="round"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="100" y="58"
        font-family="Inter, 'Segoe UI', system-ui, sans-serif"
        font-size="38" font-weight="700"
        fill="#222222" letter-spacing="-0.5">Macrosofty</text>
</svg>
