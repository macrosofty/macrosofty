<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <title>Tjopper — heart (love / thanks / made with lekker)</title>
  <path d="M 90 320 V 200 A 110 110 0 0 1 310 200 V 320"
        fill="none" stroke="#E89A2B" stroke-width="70"
        stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="rotate(2.5 200 320) translate(200 320) scale(1.30) translate(-200 -320)">
    <path d="M 153 320 Q 145 320 145 312 L 145 215 Q 145 155 200 155 Q 255 155 255 215 L 255 312 Q 255 320 247 320 Z"
          fill="#F4E9D5"/>
    <!-- arm raised, holding the heart -->
    <path d="M 250 222 Q 262 200 268 184"
          fill="none" stroke="#F4E9D5" stroke-width="20"
          stroke-linecap="round" stroke-linejoin="round"/>
    <!-- heart at the end of the arm -->
    <path d="M 270 198 C 235 174, 235 134, 252 134 C 262 134, 270 144, 270 144 C 270 144, 278 134, 288 134 C 305 134, 305 174, 270 198 Z"
          fill="#C41E3A"/>
    <!-- pinker cheeks -->
    <circle cx="170" cy="244" r="11" fill="#D87767" fill-opacity="0.55"/>
    <circle cx="230" cy="244" r="11" fill="#D87767" fill-opacity="0.55"/>
    <!-- love eyes: squinted-happy upward arcs (same family as thumbs/sleep) -->
    <path d="M 174 218 Q 184 210 194 218"
          fill="none" stroke="#222222" stroke-width="6"
          stroke-linecap="round"/>
    <path d="M 206 218 Q 216 210 226 218"
          fill="none" stroke="#222222" stroke-width="6"
          stroke-linecap="round"/>
    <!-- big content smile -->
    <path d="M 172 268 Q 200 296 228 268"
          fill="none" stroke="#222222" stroke-width="10.5"
          stroke-linecap="round"/>
  </g>
</svg>
