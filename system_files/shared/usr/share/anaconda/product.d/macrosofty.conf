# Macrosofty Anaconda product configuration.
#
# Overrides the upstream (Aurora / Fedora) product config so the
# installer screens show "Macrosofty <Edition>" branding instead of
# Aurora or stock Fedora. Anaconda matches product configs against
# the running system's os-release; our generate-os-release.sh sets:
#   ID=fedora
#   VARIANT="Macrosofty <Edition>"
# and Anaconda's product-detection looks at NAME/VARIANT.

[Product]
product_name = Macrosofty

[Base Product]
product_name = Fedora

[Anaconda]
# Default Anaconda behavioural flags — leave at upstream defaults
# unless we have a reason to deviate.

[Installation Target]
# Use the bootc payload mode for installation. Padkos / other
# Macrosofty editions deploy as ostree-container payloads.

[User Interface]
custom_stylesheet =
help_directory = /usr/share/anaconda/help/macrosofty
default_help_pages =
    HelpFedoraPlaceholder.xml
    HelpFedoraPlaceholder.xml
    HelpFedoraPlaceholder.xml

[License]
eula =

[Localization]
# Default to English; user picks at runtime.
