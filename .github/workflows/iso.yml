---
name: Build edition ISOs
on:
  workflow_dispatch:
    inputs:
      edition:
        description: "Edition (or 'all')"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - hearty
          - chunky
          - padkos
          - braai
      tag:
        description: "Source image tag"
        required: false
        default: "latest"
  # Auto-trigger after a successful build.yml on main, so the ISOs always
  # follow the latest published images. Falls through harmlessly if a build
  # fails — the `if:` below skips the job in that case.
  workflow_run:
    workflows: ["Build edition images"]
    types: [completed]
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: false

jobs:
  iso:
    name: ISO ${{ matrix.edition }}
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    strategy:
      fail-fast: false
      matrix:
        edition:
          - hearty
          - chunky
          - padkos
          - braai
        major_version: [43]

    permissions:
      contents: read
      packages: read

    env:
      # All untrusted inputs go through env first; shell only sees $VAR.
      IMAGE_TAG: ${{ inputs.tag || 'latest' }}
      EDITION: ${{ matrix.edition }}
      MAJOR_VERSION: ${{ matrix.major_version }}
      SELECTED_EDITION: ${{ inputs.edition || 'all' }}
      OWNER: ${{ github.repository_owner }}

    steps:
      - name: Skip non-selected edition
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "$SELECTED_EDITION" != "all" ] && [ "$SELECTED_EDITION" != "$EDITION" ]; then
              echo "Skipping $EDITION — only $SELECTED_EDITION requested."
              echo "skip=true" >> "$GITHUB_ENV"
          fi

      - name: Checkout
        if: env.skip != 'true'
        uses: actions/checkout@v5

      - name: Free disk space
        if: env.skip != 'true'
        # jasonn3/build-container-installer needs ~30GB headroom mid-build;
        # GHA hosted runners ship with ~14GB free. This recovers ~30GB by
        # dropping unneeded toolchains.
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1

      - name: Resolve upstream copr repo
        if: env.skip != 'true'
        id: upstream
        run: |
          # The ISO builder needs at least Fedora's repos to depsolve the
          # installer media. We also pull our upstream's copr repo so any
          # branding / firstboot packages they ship can resolve.
          case "$EDITION" in
              hearty|chunky|padkos)
                  COPR_OWNER="ublue-os"
                  COPR_NAME="aurora"
                  ;;
              braai)
                  COPR_OWNER="ublue-os"
                  COPR_NAME="bazzite"
                  ;;
              *)
                  echo "Unknown edition: $EDITION" >&2
                  exit 1
                  ;;
          esac
          # Copr's filename convention puts a '-org-' between owner and name
          # only for some projects; we try both and keep the one that works.
          BASE="https://copr.fedorainfracloud.org/coprs/${COPR_OWNER}/${COPR_NAME}/repo/fedora-${MAJOR_VERSION}"
          for fname in \
              "${COPR_NAME}-org-${COPR_NAME}-fedora-${MAJOR_VERSION}.repo" \
              "${COPR_OWNER}-${COPR_NAME}-fedora-${MAJOR_VERSION}.repo"; do
              url="${BASE}/${fname}"
              if curl -sfI "$url" >/dev/null; then
                  echo "Found: $url"
                  echo "repo_url=${url}" >> "$GITHUB_OUTPUT"
                  echo "repo_name=upstream.repo" >> "$GITHUB_OUTPUT"
                  exit 0
              fi
          done
          echo "Could not resolve copr repo for $COPR_OWNER/$COPR_NAME" >&2
          exit 1

      - name: Download upstream copr repo
        if: env.skip != 'true'
        env:
          REPO_URL: ${{ steps.upstream.outputs.repo_url }}
          REPO_NAME: ${{ steps.upstream.outputs.repo_name }}
        run: |
          curl -Lo "${GITHUB_WORKSPACE}/${REPO_NAME}" "$REPO_URL"
          echo "::group::${REPO_NAME}"
          cat "${GITHUB_WORKSPACE}/${REPO_NAME}"
          echo "::endgroup::"

      - name: Lowercase image repo
        if: env.skip != 'true'
        id: registry_case
        uses: ASzc/change-string-case-action@ecd1412d078f2e06e9eedcbaa6fcd988151c3f82 # v8
        with:
          string: ghcr.io/${{ env.OWNER }}

      - name: Pre-pull source image (private GHCR auth)
        if: env.skip != 'true'
        # jasonn3 internally uses skopeo to fetch the source image and gets
        # `unauthorized` against our private packages. Bazzite's images are
        # public so they don't hit this. Pre-pull into rootful podman storage
        # and pass image_src=containers-storage:... to jasonn3 — it then
        # skopeo-copies from local storage and never touches the registry.
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          echo "$GHCR_TOKEN" | sudo podman login ghcr.io -u "$GHCR_USER" --password-stdin
          IMAGE="ghcr.io/${OWNER}/${EDITION}:${IMAGE_TAG}"
          sudo podman pull "$IMAGE"
          sudo podman images "ghcr.io/${OWNER}/${EDITION}"

      - name: Build ISO
        if: env.skip != 'true'
        id: build
        # Same action Bazzite, Bluefin, and Aurora use to build their ISOs.
        # Wraps lorax + osbuild and crucially accepts a `repos:` whitelist —
        # bootc-image-builder eagerly reads every .repo file in the source
        # image, including disabled ones with stale GPG-key paths (this is
        # what tripped Braai on the previous bootc-image-builder pipeline).
        uses: jasonn3/build-container-installer@c9ef3de33236e66781ec37bd0485e8009eaefe24 # v1.4.0
        with:
          arch: x86_64
          image_name: ${{ matrix.edition }}
          image_repo: ${{ steps.registry_case.outputs.lowercase }}
          # Use the pre-pulled local copy via skopeo's containers-storage
          # transport, bypassing the registry-auth path.
          image_src: containers-storage:ghcr.io/${{ env.OWNER }}/${{ matrix.edition }}:${{ env.IMAGE_TAG }}
          variant: 'Kinoite'
          version: ${{ matrix.major_version }}
          image_tag: ${{ env.IMAGE_TAG }}
          iso_name: macrosofty-${{ matrix.edition }}-amd64.iso
          enable_cache_dnf: "false"
          enable_cache_skopeo: "false"
          enable_flatpak_dependencies: "false"
          repos: '/github/workspace/upstream.repo /etc/yum.repos.d/fedora.repo /etc/yum.repos.d/fedora-updates.repo'

      - name: Stage ISO + checksum for upload
        if: env.skip != 'true'
        id: stage
        env:
          ISO_PATH: ${{ steps.build.outputs.iso_path }}
          ISO_NAME: ${{ steps.build.outputs.iso_name }}
        run: |
          mkdir -p upload
          mv "${ISO_PATH}/${ISO_NAME}" upload/
          if [ -f "${ISO_PATH}/${ISO_NAME}-CHECKSUM" ]; then
              mv "${ISO_PATH}/${ISO_NAME}-CHECKSUM" upload/
          fi
          DATED="macrosofty-${EDITION}-$(date -u +%Y%m%d)"
          mv "upload/${ISO_NAME}" "upload/${DATED}.iso" 2>/dev/null || true
          if [ -f "upload/${ISO_NAME}-CHECKSUM" ]; then
              mv "upload/${ISO_NAME}-CHECKSUM" "upload/${DATED}.iso.sha256" 2>/dev/null || true
          fi
          ls -lh upload/
          echo "name=${DATED}" >> "$GITHUB_OUTPUT"

      - name: Upload ISO artefact
        if: env.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.stage.outputs.name }}
          path: upload/
          if-no-files-found: error
          retention-days: 30
          compression-level: 0  # ISOs are already compressed
